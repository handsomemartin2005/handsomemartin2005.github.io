<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>handsomemartin2005 的个人主页</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #f8fbff);
            color: #222;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 20px;
            text-align: center;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #2f80ed;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 46px;
            margin: 0 auto 24px;
            box-shadow: 0 8px 20px rgba(47, 128, 237, 0.25);
        }

        h1 {
            font-size: 38px;
            margin-bottom: 12px;
        }

        p {
            font-size: 18px;
            line-height: 1.8;
            color: #555;
        }

        .card {
            margin-top: 40px;
            padding: 28px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            text-align: left;
        }

        .card h2 {
            margin-top: 0;
            color: #2f80ed;
        }

        .footer {
            margin-top: 50px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">👨‍💻</div>

        <h1>你好，我是 handsomemartin2005</h1>

        <p>
            这是我的 GitHub Pages 个人主页。<br>
            后续这里可以展示我的项目、学习记录、课程设计、论文成果和个人简历。
        </p>

        <div class="card">
            <h2>关于我</h2>
            <p>
                我正在学习计算机相关技术，关注软件开发、人工智能、计算机视觉和项目实践。
            </p>
        </div>

        <div class="card">
            <h2>我的项目</h2>
            <p>
                这里之后可以放大学生竞赛信息智能筛选与推荐系统、YOLO 目标检测项目、GitHub 数据分析项目等。
            </p>
        </div>

        <div class="footer">
            © 2026 handsomemartin2005
        </div>
    </div>
</body>
</html>
